{{define "title"}}Shorten your URLs{{end}}
{{define "content"}}
<section class="hero">
  <h1 class="hero-title">Shorten any URL</h1>
  <p class="hero-subtitle">Paste your long URL and get a short, shareable link instantly.</p>
</section>
<div class="shorten-form">
  <form hx-post="/shorten" hx-target="#result" hx-swap="innerHTML">
    <div class="shorten-input-group">
      <input type="url" name="original_url" class="form-input" placeholder="https://example.com/your-very-long-url" required>
      <button type="submit" class="btn btn-primary">Shorten</button>
    </div>
    <div class="shorten-extras">
      <input type="text" name="short_code" class="form-input" placeholder="Custom alias (optional)">
      <input type="datetime-local" name="expires_at" class="form-input" placeholder="Expires at (optional)">
    </div>
  </form>
  <div id="result"></div>
</div>
{{end}}

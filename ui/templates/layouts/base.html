{{define "base"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>shrt — {{block "title" .}}URL Shortener{{end}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="/static/js/htmx.min.js"></script>
  <script>
    function capInputs(form) {
      form.querySelectorAll('[data-max]').forEach(function(el) {
        el.setAttribute('maxlength', el.dataset.max);
      });
      form.querySelectorAll('[data-min]').forEach(function(el) {
        el.setAttribute('minlength', el.dataset.min);
      });
    }
    function copyURL(btn, url) {
      navigator.clipboard.writeText(url).then(function() {
        btn.querySelector('.copy-icon').style.display = 'none';
        btn.querySelector('.check-icon').style.display = '';
        setTimeout(function() {
          btn.querySelector('.copy-icon').style.display = '';
          btn.querySelector('.check-icon').style.display = 'none';
        }, 1500);
      });
    }
    function showFormErrors(formId, errors) {
      var box = document.querySelector('#' + formId + ' #form-errors');
      if (!box) return;
      box.innerHTML = '<div class="alert alert-warning mt-md"><ul class="error-list">' +
        errors.map(function(e) { return '<li>' + e + '</li>'; }).join('') +
        '</ul></div>';
    }
  </script>
</head>
<body>
  {{template "nav" .}}
  <main>
    {{block "content" .}}{{end}}
  </main>
  <div id="confirm-modal" class="modal-overlay" style="display:none">
    <div class="modal-card">
      <p class="modal-text">Are you sure you want to delete this link?</p>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeConfirmModal()">Cancel</button>
        <button id="confirm-modal-yes" class="btn btn-danger-solid">Delete</button>
      </div>
    </div>
  </div>
  <script>
    let pendingDeleteEl = null;
    function openConfirmModal(btn) {
      pendingDeleteEl = btn;
      document.getElementById('confirm-modal').style.display = '';
    }
    function closeConfirmModal() {
      pendingDeleteEl = null;
      document.getElementById('confirm-modal').style.display = 'none';
    }
    document.getElementById('confirm-modal-yes').addEventListener('click', function() {
      if (pendingDeleteEl) {
        pendingDeleteEl.removeAttribute('onclick');
        htmx.trigger(pendingDeleteEl, 'confirmed');
      }
      closeConfirmModal();
    });
    document.getElementById('confirm-modal').addEventListener('click', function(e) {
      if (e.target === this) closeConfirmModal();
    });
  </script>
  <footer>
    <div class="container footer-inner">
      <a href="https://github.com/juanpeyrot/shrt" target="_blank" class="footer-star">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
        Give it a star
        <svg class="star-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      </a>
    </div>
  </footer>
</body>
</html>
{{end}}

{{define "link_edit"}}
<tr id="row-{{.Link.ShortCode}}">
  <td><span class="short-code">{{.Link.ShortCode}}</span></td>
  <td colspan="4">
    {{if .Error}}<div class="alert alert-error mb-md">{{.Error}}</div>{{end}}
    <form class="inline-edit"
          hx-put="/dashboard/links/{{.Link.ShortCode}}"
          hx-target="#row-{{.Link.ShortCode}}"
          hx-swap="outerHTML">
      <input type="url" name="url" class="form-input" value="{{.Link.OriginalURL}}" required maxlength="2048" pattern="https?://[a-zA-Z0-9].*\..*">
      <button type="submit" class="btn btn-primary btn-sm">Save</button>
      <button type="button" class="btn btn-outline btn-sm"
              hx-get="/dashboard/links/{{.Link.ShortCode}}/row"
              hx-target="#row-{{.Link.ShortCode}}"
              hx-swap="outerHTML">Cancel</button>
    </form>
  </td>
  <td></td>
</tr>
{{end}}

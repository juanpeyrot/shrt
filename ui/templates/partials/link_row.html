{{define "link_row"}}
<tr id="row-{{.Link.ShortCode}}">
  <td>
    <div class="short-code-cell">
      <a href="{{shortURL .Link.ShortCode}}" target="_blank" class="short-code">{{.Link.ShortCode}}</a>
      <button class="copy-btn" onclick="copyURL(this, '{{shortURL .Link.ShortCode}}')" title="Copy short URL">
        <svg class="copy-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        <svg class="check-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polyline points="20 6 9 17 4 12"/></svg>
      </button>
    </div>
  </td>
  <td class="original-url" title="{{.Link.OriginalURL}}">{{.Link.OriginalURL}}</td>
  <td class="click-count">{{.Link.ClickCount}}</td>
  <td>{{formatDate .Link.CreatedAt}}</td>
  <td>
    <div class="actions">
      <button class="action-btn action-stats"
              hx-get="/dashboard/links/{{.Link.ShortCode}}/stats"
              hx-target="#stats-panel"
              hx-swap="innerHTML">Stats</button>
      <button class="action-btn action-edit"
              hx-get="/dashboard/links/{{.Link.ShortCode}}/edit"
              hx-target="#row-{{.Link.ShortCode}}"
              hx-swap="outerHTML">Edit</button>
      <button class="action-btn action-delete"
              hx-delete="/dashboard/links/{{.Link.ShortCode}}"
              hx-target="#row-{{.Link.ShortCode}}"
              hx-swap="outerHTML swap:200ms"
              hx-trigger="confirmed"
              onclick="openConfirmModal(this)">Delete</button>
    </div>
  </td>
</tr>
{{end}}
